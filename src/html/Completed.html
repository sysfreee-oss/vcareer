<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f5f6f8;margin:0;color:#222}
    .wrap{max-width:640px;margin:0 auto;padding:24px 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    h1{font-size:20px;color:#188038}
    dl{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:12px 16px}
    dt{font-size:12px;color:#666;margin-top:8px}
    dd{margin:2px 0 0;font-size:14px;word-break:break-all}
    p{line-height:1.7}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>✓ 締結が完了しました</h1>
      <p><?= data.name ?> 様、電子署名ありがとうございました。締結済の契約書は担当者より別途お送りします。</p>
      <dl>
        <dt>締結証明書番号</dt><dd><?= data.certNo ?></dd>
        <dt>文書ハッシュ（SHA-256）</dt><dd><?= data.docHash ?></dd>
      </dl>
      <p class="muted">この画面は閉じていただいて構いません。</p>
    </div>
  </div>
</body>
</html>
