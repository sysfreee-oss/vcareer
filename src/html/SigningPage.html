<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#f5f6f8;margin:0;color:#222}
    .wrap{max-width:640px;margin:0 auto;padding:24px 16px}
    .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    h1{font-size:20px;margin:0 0 4px}
    p{line-height:1.7}
    .muted{color:#666;font-size:13px}
    .signed{font-size:12px;color:#188038;margin:0 0 12px}
    .err{background:#fdecec;color:#b3261e;padding:10px 12px;border-radius:8px;margin:12px 0;font-size:14px}
    label{display:block;margin:14px 0 4px;font-weight:600;font-size:14px}
    input[type=text],input[type=email]{width:100%;padding:11px;font-size:15px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
    .contract{white-space:pre-wrap;border:1px solid #e0e0e0;border-radius:8px;padding:16px;max-height:360px;overflow:auto;background:#fafafa;font-size:14px;line-height:1.8;margin-top:8px}
    .agree{display:flex;align-items:flex-start;gap:8px;margin:18px 0;font-size:14px}
    button{width:100%;padding:14px;font-size:16px;font-weight:700;color:#fff;background:#1a73e8;border:0;border-radius:8px;cursor:pointer;margin-top:6px}
    button:hover{background:#1666cf}
    button.secondary{background:#eee;color:#333}
    .row{display:flex;gap:10px}
    .row button{margin-top:0}
    .note{font-size:12px;color:#888;margin-top:16px}
    .summary{font-size:13px;color:#444;background:#f0f4ff;border-radius:8px;padding:10px 12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>契約書 電子署名</h1>
      <? if (data.signerEmail) { ?>
        <p class="signed">✓ <?= data.signerEmail ?> でサインイン中</p>
      <? } else { ?>
        <p class="muted">Googleアカウントでサインインした状態でご利用ください。</p>
      <? } ?>

      <? if (data.error) { ?><div class="err"><?= data.error ?></div><? } ?>

      <? if (data.step === 'review') { ?>
        <!-- ステップ2: 契約本文の確認と署名 -->
        <p class="muted">以下の契約内容をご確認のうえ、同意して署名してください。</p>
        <div class="summary">署名者: <?= data.name ?>（<?= data.signerEmail ?>）</div>
        <div class="contract"><?= data.contractText ?></div>
        <form method="post" action="<?= actionUrl ?>">
          <input type="hidden" name="action" value="sign">
          <input type="hidden" name="docUrl" value="<?= data.docUrl ?>">
          <input type="hidden" name="name" value="<?= data.name ?>">
          <input type="hidden" name="email" value="<?= data.signerEmail ?>">
          <div class="agree">
            <input type="checkbox" id="agree" name="agree">
            <label for="agree" style="margin:0;font-weight:400">上記の契約内容を確認し、これに同意して電子署名します。</label>
          </div>
          <button type="submit">同意して署名する</button>
        </form>
        <form method="post" action="<?= actionUrl ?>" style="margin-top:8px">
          <input type="hidden" name="action" value="edit">
          <input type="hidden" name="docUrl" value="<?= data.docUrl ?>">
          <input type="hidden" name="name" value="<?= data.name ?>">
          <input type="hidden" name="email" value="<?= data.signerEmail ?>">
          <button type="submit" class="secondary">入力に戻る</button>
        </form>
        <p class="note">署名すると、締結日時・文書ハッシュ（SHA-256）・本人確認記録を付与した署名済PDFを、発行者とあなたの双方へメールで送信します。</p>

      <? } else { ?>
        <!-- ステップ1: 入力 -->
        <form method="post" action="<?= actionUrl ?>">
          <input type="hidden" name="action" value="preview">

          <label for="docUrl">契約書ドキュメントのURL</label>
          <input type="text" id="docUrl" name="docUrl" value="<?= data.docUrl ?>" placeholder="https://docs.google.com/document/d/..." required>

          <label for="name">お名前</label>
          <input type="text" id="name" name="name" value="<?= data.name ? data.name : '' ?>" required>

          <label for="email">メールアドレス（署名済PDFの送付先）</label>
          <input type="email" id="email" name="email" value="<?= data.signerEmail ?>" required>

          <button type="submit">契約内容を確認する</button>
        </form>
        <p class="note">次の画面で契約本文を確認し、同意のうえ署名します。</p>
      <? } ?>

    </div>
  </div>
</body>
</html>
