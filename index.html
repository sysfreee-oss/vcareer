<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>契約書 電子署名</title>
<style>
  :root { --accent:#1a73e8; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif; background:#f5f6f8; margin:0; color:#222; }
  .wrap { max-width:640px; margin:0 auto; padding:24px 16px; }
  .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  h1 { font-size:20px; margin:0 0 4px; }
  p { line-height:1.7; }
  .muted { color:#666; font-size:13px; }
  .err { background:#fdecec; color:#b3261e; padding:10px 12px; border-radius:8px; margin:12px 0; font-size:14px; display:none; }
  .info { background:#e8f0fe; color:#174ea6; padding:10px 12px; border-radius:8px; margin:12px 0; font-size:14px; }
  label { display:block; margin:14px 0 4px; font-weight:600; font-size:14px; }
  input[type=text], input[type=email], input[type=tel] { width:100%; padding:11px; font-size:15px; border:1px solid #ccc; border-radius:8px; }
  #code { letter-spacing:.4em; text-align:center; font-size:22px; }
  .agree { display:flex; align-items:flex-start; gap:8px; margin:18px 0; font-size:14px; }
  button { width:100%; padding:14px; font-size:16px; font-weight:700; color:#fff; background:var(--accent); border:0; border-radius:8px; cursor:pointer; margin-top:8px; }
  button:hover { background:#1666cf; }
  button:disabled { background:#9db8e0; cursor:default; }
  button.secondary { background:#eee; color:#333; }
  a.doclink { display:inline-block; margin:10px 0; font-size:15px; color:var(--accent); font-weight:600; }
  .link { background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0;margin-top:8px;width:auto;font-weight:600; }
  .note { font-size:12px; color:#888; margin-top:16px; }
  .summary { font-size:13px; color:#444; background:#f0f4ff; border-radius:8px; padding:10px 12px; }
  .done { text-align:center; padding:8px 0; }
  .done .check { font-size:44px; color:#188038; }
  .kv { font-size:13px; color:#444; background:#fafafa; border:1px solid #eee; border-radius:8px; padding:12px; margin-top:12px; word-break:break-all; white-space:pre-wrap; }
  .spin { display:none; text-align:center; color:#666; font-size:14px; margin-top:12px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>契約書 電子署名</h1>
    <div id="err" class="err"></div>

    <!-- STEP 1: 入力 → 確認コード送信 -->
    <section id="step-input">
      <p class="muted">契約書の内容をご確認のうえ、お名前とメールアドレスを入力してください。メールに届く確認コードで本人確認を行います。</p>
      <div id="doc-area"></div>
      <label for="name">お名前</label>
      <input type="text" id="name" placeholder="山田 太郎">
      <label for="email">メールアドレス（確認コード／署名済PDFの送付先）</label>
      <input type="email" id="email" placeholder="you@example.com">
      <button id="btn-otp">確認コードをメールで送信</button>
      <p class="note">入力したメールアドレス宛てに6桁の確認コードを送信します。</p>
    </section>

    <!-- STEP 2: コード入力 → 署名 -->
    <section id="step-verify" class="hidden">
      <div class="info">確認コードをメールで送信しました。メールに記載の6桁コードを入力してください。（届くまで数十秒かかる場合があります）</div>
      <div class="summary" id="verify-summary"></div>
      <a id="doc-open2" class="doclink" href="#" target="_blank" rel="noopener">▶ 契約書を開いて内容を確認する</a>
      <label for="code">確認コード（6桁）</label>
      <input type="tel" id="code" maxlength="6" inputmode="numeric" placeholder="______">
      <label class="agree"><input type="checkbox" id="agree"><span>上記の契約内容を確認し、これに同意して電子署名します。</span></label>
      <button id="btn-sign">同意して署名する</button>
      <button type="button" class="link" id="btn-resend">確認コードを再送する</button>
      <button class="secondary" id="btn-back">戻る</button>
      <p class="note">署名すると、締結日時・文書ハッシュ（SHA-256）・本人確認記録を付与した署名済PDFを、発行者とあなたの双方へメール送信します。</p>
    </section>

    <!-- STEP 3: 完了 -->
    <section id="step-done" class="hidden">
      <div class="done">
        <div class="check">&#10004;</div>
        <h1 id="done-title">署名が完了しました</h1>
        <p class="muted" id="done-name"></p>
      </div>
      <div class="kv hidden" id="done-kv"></div>
      <p id="done-msg" style="margin-top:14px"></p>
    </section>

    <div id="spin" class="spin">処理中です。しばらくお待ちください…</div>
  </div>
</div>

<script>
// ===== GASウェブアプリ(exec)のURL =====
var GAS_URL = "https://script.google.com/macros/s/AKfycbzvXXEqOwwG80-Kvsx6DdNtMD9fw7Mza3QLQ2MROSIRY_HLr701xiDIxfaNUP69eajI/exec";

var $ = function (id) { return document.getElementById(id); };
var state = { docUrl:"", name:"", email:"" };

function getParam(k){ var m=new RegExp("[?&]"+k+"=([^&]+)").exec(location.search); return m?decodeURIComponent(m[1]):""; }
function showErr(msg){ var e=$("err"); e.textContent=msg||""; e.style.display=msg?"block":"none"; if(msg)window.scrollTo(0,0); }
function show(step){ ["step-input","step-verify","step-done"].forEach(function(s){$(s).classList.add("hidden");}); $(step).classList.remove("hidden"); }
function busy(on){ $("spin").style.display=on?"block":"none"; }
function qs(o){ return Object.keys(o).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(o[k]);}).join("&"); }

// 契約書ドキュメント: リンクの ?doc= で指定（発行者が用意した、sys.freeeがアクセスできる契約書）。
// 指定が無い場合のみ手入力欄を出す（後方互換）。
var docParam = getParam("doc");
(function initDoc(){
  var area = $("doc-area");
  if (docParam) {
    state.docUrl = docParam;
    area.innerHTML = '<a class="doclink" id="doc-open1" href="#" target="_blank" rel="noopener">▶ 契約書を開いて内容を確認する</a>';
    $("doc-open1").href = state.docUrl;
  } else {
    area.innerHTML = '<label for="docUrl">契約書ドキュメントのURL</label>'
      + '<input type="text" id="docUrl" placeholder="https://docs.google.com/document/d/...">';
  }
})();

function collect(){
  if (!docParam) state.docUrl = ($("docUrl")?$("docUrl").value:"").trim();
  state.name = $("name").value.trim();
  state.email = $("email").value.trim();
  if (!state.docUrl) return "契約書ドキュメントが指定されていません。";
  if (!state.name) return "お名前を入力してください。";
  if (!state.email || state.email.indexOf("@")===-1) return "メールアドレスを入力してください。";
  return "";
}

// JSONP優先(レスポンスを読める)＋ 失敗時は cookieなし no-cors で確実に到達(読めないが処理される)。
// nonce によりサーバ側で二重処理を防止。
function callApi(params, onResult){
  var query = qs(params);
  var cb = "cb_" + Math.random().toString(36).slice(2);
  var s = document.createElement("script");
  var done = false;
  var timer = setTimeout(function(){ if(done)return; finish(); fallback(); }, 20000);
  function finish(){ done=true; clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); }
  window[cb] = function(data){ if(done)return; finish(); onResult(data, "jsonp"); };
  s.onerror = function(){ if(done)return; finish(); fallback(); };
  function fallback(){
    fetch(GAS_URL + "?" + query, { method:"GET", mode:"no-cors", credentials:"omit" })
      .then(function(){ onResult({ ok:true, unread:true }, "nocors"); })
      .catch(function(){ onResult({ ok:false, error:"送信に失敗しました。通信環境をご確認ください。" }, "error"); });
  }
  s.src = GAS_URL + "?" + query + "&callback=" + cb;
  document.body.appendChild(s);
}

function sendOtp(){
  showErr("");
  busy(true); $("btn-otp").disabled = true; $("btn-resend").disabled = true;
  callApi({ action:"otp", email:state.email }, function(r, src){
    busy(false); $("btn-otp").disabled = false; $("btn-resend").disabled = false;
    if (src === "jsonp" && r && !r.ok) { showErr(r.error || "コード送信に失敗しました。"); return; }
    // jsonp成功 or no-cors(未読) → コードはメール送信済みとして次へ
    $("verify-summary").textContent = "署名者: " + state.name + "（" + state.email + "）";
    $("doc-open2").href = state.docUrl;
    show("step-verify");
  });
}

$("btn-otp").addEventListener("click", function(){
  var v = collect(); if (v){ showErr(v); return; }
  sendOtp();
});
$("btn-resend").addEventListener("click", function(){ showErr(""); sendOtp(); });
$("btn-back").addEventListener("click", function(){ showErr(""); show("step-input"); });

$("btn-sign").addEventListener("click", function(){
  showErr("");
  var code = $("code").value.trim();
  if (!/^\d{6}$/.test(code)) { showErr("メールに届いた6桁の確認コードを入力してください。"); return; }
  if (!$("agree").checked) { showErr("「同意します」にチェックしてください。"); return; }
  busy(true); $("btn-sign").disabled = true;
  var nonce = Date.now().toString(36) + Math.random().toString(36).slice(2);
  callApi({ action:"sign", docUrl:state.docUrl, name:state.name, email:state.email, code:code, nonce:nonce },
    function(r, src){
      busy(false); $("btn-sign").disabled = false;
      if (src === "jsonp") {
        if (!r || !r.ok) { showErr((r && r.error) || "署名に失敗しました。"); return; }
        $("done-title").textContent = "署名が完了しました";
        $("done-name").textContent = state.name + " 様";
        var kv = "";
        if (r.certNo) kv += "締結証明書番号: " + r.certNo + "\n";
        if (r.docHash) kv += "文書ハッシュ(SHA-256): " + r.docHash;
        if (kv) { $("done-kv").textContent = kv; $("done-kv").classList.remove("hidden"); }
        $("done-msg").textContent = "署名済PDFを、発行者とあなたのメールアドレス宛てに送信しました。";
        show("step-done");
      } else {
        // no-cors(結果を読めない): 受付表示。成否はメール到達で確認。
        $("done-title").textContent = "署名を送信しました";
        $("done-name").textContent = state.name + " 様";
        $("done-msg").textContent = "署名済PDFが届けば締結完了です。数分たっても届かない場合は、確認コードの誤り等で処理が完了していない可能性があります。お手数ですが再度お試しいただくか、発行者へご連絡ください。";
        show("step-done");
      }
    });
});
</script>
</body>
</html>
