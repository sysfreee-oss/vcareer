<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>契約書 電子署名</title>
<style>
  :root { --accent:#1a73e8; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif; background:#f5f6f8; margin:0; color:#222; }
  .wrap { max-width:640px; margin:0 auto; padding:24px 16px; }
  .card { background:#fff; border-radius:12px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  h1 { font-size:20px; margin:0 0 4px; }
  p { line-height:1.7; }
  .muted { color:#666; font-size:13px; }
  .err { background:#fdecec; color:#b3261e; padding:10px 12px; border-radius:8px; margin:12px 0; font-size:14px; display:none; }
  label { display:block; margin:14px 0 4px; font-weight:600; font-size:14px; }
  input[type=text], input[type=email] { width:100%; padding:11px; font-size:15px; border:1px solid #ccc; border-radius:8px; }
  .contract { white-space:pre-wrap; border:1px solid #e0e0e0; border-radius:8px; padding:16px; max-height:360px; overflow:auto; background:#fafafa; font-size:14px; line-height:1.8; margin-top:8px; }
  .agree { display:flex; align-items:flex-start; gap:8px; margin:18px 0; font-size:14px; }
  button { width:100%; padding:14px; font-size:16px; font-weight:700; color:#fff; background:var(--accent); border:0; border-radius:8px; cursor:pointer; margin-top:8px; }
  button:hover { background:#1666cf; }
  button:disabled { background:#9db8e0; cursor:default; }
  button.secondary { background:#eee; color:#333; }
  button.secondary:hover { background:#e0e0e0; }
  .note { font-size:12px; color:#888; margin-top:16px; }
  .summary { font-size:13px; color:#444; background:#f0f4ff; border-radius:8px; padding:10px 12px; }
  .done { text-align:center; padding:8px 0; }
  .done .check { font-size:44px; color:#188038; }
  .kv { font-size:13px; color:#444; background:#fafafa; border:1px solid #eee; border-radius:8px; padding:12px; margin-top:12px; word-break:break-all; }
  .spin { display:none; text-align:center; color:#666; font-size:14px; margin-top:12px; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>契約書 電子署名</h1>

    <div id="err" class="err"></div>

    <!-- STEP 1: 入力 -->
    <section id="step-input">
      <p class="muted">契約書ドキュメントのURLと、あなたのお名前・メールアドレスを入力してください。</p>
      <label for="docUrl">契約書ドキュメントのURL</label>
      <input type="text" id="docUrl" placeholder="https://docs.google.com/document/d/...">
      <label for="name">お名前</label>
      <input type="text" id="name" placeholder="山田 太郎">
      <label for="email">メールアドレス（署名済PDFの送付先）</label>
      <input type="email" id="email" placeholder="you@example.com">
      <button id="btn-preview">内容を確認する</button>
      <p class="note">次の画面で契約本文を確認し、同意のうえ署名します。</p>
    </section>

    <!-- STEP 2: 確認 -->
    <section id="step-review" class="hidden">
      <div class="summary" id="review-summary"></div>
      <div class="contract" id="review-contract"></div>
      <label class="agree"><input type="checkbox" id="agree"><span>上記の契約内容を確認し、これに同意して電子署名します。</span></label>
      <button id="btn-sign">同意して署名する</button>
      <button class="secondary" id="btn-back">入力に戻る</button>
      <p class="note">署名すると、締結日時・文書ハッシュ（SHA-256）・本人確認記録を付与した署名済PDFを、発行者とあなたの双方へメールで送信します。</p>
    </section>

    <!-- STEP 3: 完了 -->
    <section id="step-done" class="hidden">
      <div class="done">
        <div class="check">&#10004;</div>
        <h1>締結が完了しました</h1>
        <p class="muted" id="done-name"></p>
      </div>
      <div class="kv" id="done-kv"></div>
      <p class="note">署名済PDFを発行者とあなたのメールアドレスへ送信しました。ご確認ください。</p>
    </section>

    <div id="spin" class="spin">処理中です。しばらくお待ちください…</div>
  </div>
</div>

<script>
// ===== 設定：GASウェブアプリ(exec)のURL。デプロイ後に差し替え =====
var GAS_URL = "https://script.google.com/macros/s/AKfycbzvXXEqOwwG80-Kvsx6DdNtMD9fw7Mza3QLQ2MROSIRY_HLr701xiDIxfaNUP69eajI/exec";

var $ = function (id) { return document.getElementById(id); };
var state = { docUrl:"", name:"", email:"", contractText:"" };

function showErr(msg) { var e=$("err"); e.textContent=msg; e.style.display = msg ? "block" : "none"; }
function show(step) {
  ["step-input","step-review","step-done"].forEach(function(s){ $(s).classList.add("hidden"); });
  $(step).classList.remove("hidden");
}
function busy(on) { $("spin").style.display = on ? "block" : "none"; }

function jsonp(params) {
  return new Promise(function (resolve, reject) {
    var cb = "cb_" + Math.random().toString(36).slice(2);
    var s = document.createElement("script");
    var timer = setTimeout(function(){ cleanup(); reject(new Error("タイムアウトしました。時間をおいて再度お試しください。")); }, 90000);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if (s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = function (data) { cleanup(); resolve(data); };
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+"="+encodeURIComponent(params[k]); }).join("&");
    s.src = GAS_URL + "?" + qs + "&callback=" + cb;
    s.onerror = function(){ cleanup(); reject(new Error("通信に失敗しました。ネットワークをご確認ください。")); };
    document.body.appendChild(s);
  });
}

$("btn-preview").addEventListener("click", function () {
  showErr("");
  state.docUrl = $("docUrl").value.trim();
  state.name = $("name").value.trim();
  state.email = $("email").value.trim();
  if (!state.docUrl || !state.name || !state.email) { showErr("すべての項目を入力してください。"); return; }
  busy(true); this.disabled = true;
  var btn = this;
  jsonp({ action:"preview", docUrl:state.docUrl, name:state.name, email:state.email })
    .then(function (r) {
      busy(false); btn.disabled = false;
      if (!r || !r.ok) { showErr((r && r.error) || "内容を取得できませんでした。"); return; }
      state.contractText = r.contractText || "";
      $("review-summary").textContent = "署名者: " + state.name + "（" + state.email + "）";
      $("review-contract").textContent = state.contractText;
      $("agree").checked = false;
      show("step-review");
    })
    .catch(function (e) { busy(false); btn.disabled = false; showErr(e.message); });
});

$("btn-back").addEventListener("click", function () { showErr(""); show("step-input"); });

$("btn-sign").addEventListener("click", function () {
  showErr("");
  if (!$("agree").checked) { showErr("「同意します」にチェックしてください。"); return; }
  busy(true); this.disabled = true;
  var btn = this;
  jsonp({ action:"sign", docUrl:state.docUrl, name:state.name, email:state.email, agree:"true" })
    .then(function (r) {
      busy(false); btn.disabled = false;
      if (!r || !r.ok) { showErr((r && r.error) || "署名処理に失敗しました。"); return; }
      $("done-name").textContent = state.name + " 様";
      var kv = "";
      if (r.certNo) kv += "締結証明書番号: " + r.certNo + "\n";
      if (r.docHash) kv += "文書ハッシュ(SHA-256): " + r.docHash;
      $("done-kv").textContent = kv;
      show("step-done");
    })
    .catch(function (e) { busy(false); btn.disabled = false; showErr(e.message); });
});
</script>
</body>
</html>
